kind = "web"
previewPath = "/"
title = "Loyalty & Referral System"
version = "1.0.0"
id = "artifacts/loyalty-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 3000

[services.development]
run = "pnpm --filter @workspace/loyalty-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/loyalty-app", "run", "build" ]
publicDir = "artifacts/loyalty-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "3000"
BASE_PATH = "/"
